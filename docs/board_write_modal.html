<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 모달 - SkyHR</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS Variables */
    :root {
      --primary-blue: #004990;
      --primary-blue-dark: #003366;
      --primary-blue-light: #0066cc;
      --sky-blue: #87CEEB;
      --sky-blue-light: #e6f3ff;
      --bg-light-blue: #f0f7ff;
      --accent-gold: #C4A35A;
      --accent-red: #e63946;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #3b82f6;
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 350ms ease;
      --border-radius: 8px;
      --border-radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-light-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* 글쓰기 모달 스타일 */
    .write-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 1;
      visibility: visible;
    }

    .write-modal {
      background: var(--white);
      border-radius: var(--border-radius-lg);
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(1);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .write-modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .write-modal-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gray-800);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .write-modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--gray-100);
      border-radius: 50%;
      color: var(--gray-500);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .write-modal-close:hover {
      background: var(--gray-200);
      color: var(--gray-700);
    }

    .write-modal-body {
      padding: 24px;
    }

    .write-modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-700);
      margin-bottom: 6px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--gray-300);
      border-radius: var(--border-radius);
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(0, 73, 144, 0.1);
    }

    .form-input::placeholder {
      color: var(--gray-400);
    }

    .form-textarea {
      resize: vertical;
      min-height: 300px;
    }

    /* Button Styles */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--border-radius);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary-blue);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--primary-blue-dark);
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
    }

    .btn-secondary:hover {
      background: var(--gray-200);
    }
  </style>
</head>
<body>
  <!-- 글쓰기 모달 -->
  <div class="write-modal-overlay">
    <div class="write-modal">
      <div class="write-modal-header">
        <h3><i class="fas fa-edit"></i> 새 글 작성</h3>
        <button class="write-modal-close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="write-modal-body">
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="form-select">
            <option>일반게시판</option>
            <option>공지사항</option>
            <option>이벤트</option>
            <option>Q&A</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">제목</label>
          <input type="text" class="form-input" placeholder="제목을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <textarea class="form-textarea" rows="15" placeholder="내용을 입력하세요..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">첨부파일</label>
          <input type="file" class="form-input" multiple>
          <small style="color: var(--gray-500); font-size: 0.75rem; margin-top: 4px; display: block;">최대 5개 파일, 각 10MB 이하</small>
        </div>
      </div>
      <div class="write-modal-footer">
        <button class="btn btn-secondary">
          <i class="fas fa-times"></i> 취소
        </button>
        <button class="btn btn-primary">
          <i class="fas fa-paper-plane"></i> 등록하기
        </button>
      </div>
    </div>
  </div>
</body>
</html>
