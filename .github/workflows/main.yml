name: Notion Issue Sync

on:
  issues:
    types: [opened]

jobs:
  create-card:
    runs-on: ubuntu-latest
    steps:
      - name: Create Notion Page
        run: |
          echo "📝 Issue 정보:"
          echo "  제목: ${{ github.event.issue.title }}"
          echo "  URL: ${{ github.event.issue.html_url }}"
          echo "  Database ID: ${{ secrets.NOTION_DATABASE_ID }}"
          echo ""
          
          # jq를 사용해서 JSON을 안전하게 생성 (특수문자/한글 포함)
          PAYLOAD=$(jq -n \
            --arg title "${{ github.event.issue.title }}" \
            --arg url "${{ github.event.issue.html_url }}" \
            '{
              "parent": { "database_id": "${{ secrets.NOTION_DATABASE_ID }}" },
              "properties": {
                "이름": {
                  "title": [{ "text": { "content": $title } }]
                },
                "GitHub 링크": {
                  "url": $url
                },
                "상태": {
                  "status": { "name": "시작 전" }
                }
              }
            }')
          
          echo "📤 전송할 JSON:"
          echo "$PAYLOAD" | jq .
          echo ""
          
          # curl 실행 (응답 본문을 반드시 받아야 함)
          HTTP_CODE=$(curl -i -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "$PAYLOAD" 2>&1 | tee /tmp/response.txt | grep "^HTTP" | awk '{print $2}')
          
          echo ""
          echo "📡 API 응답:"
          cat /tmp/response.txt | tail -n +2
          echo ""
          
          # HTTP 코드 추출 (위에서 grep으로 못 잡은 경우 대비)
          if [ -z "$HTTP_CODE" ]; then
            HTTP_CODE=$(grep "^{" /tmp/response.txt 2>/dev/null | jq -r '.status // empty' || echo "UNKNOWN")
          fi
          
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "" ]; then
            echo "❌ 요청 실패! (HTTP $HTTP_CODE)"
            echo ""
            echo "🔍 문제 해결 가이드:"
            echo ""
            echo "【 단계 1 】 인증 확인"
            echo "  NOTION_API_KEY가 유효한가? (Settings → Secrets → NOTION_API_KEY 확인)"
            echo ""
            echo "【 단계 2 】 Database ID 확인"
            echo "  NOTION_DATABASE_ID가 맞는가?"
            echo "  Notion DB URL에서: https://notion.so/[DATABASE_ID]?v=..."
            echo ""
            echo "【 단계 3 】 Integration 연결 확인"
            echo "  Notion DB 페이지 → 우측 상단 '···' → 'Connections' 확인"
            echo "  Integration이 데이터베이스에 직접 연결되어야 함"
            echo ""
            echo "【 단계 4 】 속성명 및 타입 확인"
            echo "  터미널에서 다음 명령어 실행:"
            echo ""
            echo "  curl -s https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }} \\"
            echo "    -H 'Authorization: Bearer ${{ secrets.NOTION_API_KEY }}' \\"
            echo "    -H 'Notion-Version: 2022-06-28' | jq '.properties'"
            echo ""
            echo "  그 결과에서:"
            echo "  - 속성명이 정확히 '이름', 'GitHub 링크', '상태'인가?"
            echo "  - '상태'의 type이 'status'인가? (select면 아래 수정)"
            echo ""
            echo "【 단계 5 】 속성 타입 수정 필요 시"
            echo "  만약 '상태'가 'select' 타입이면:"
            echo "    \"상태\": { \"select\": { \"name\": \"시작 전\" } }"
            echo ""
            echo "  만약 '상태'가 'multi_select' 타입이면:"
            echo "    \"상태\": { \"multi_select\": [ { \"name\": \"시작 전\" } ] }"
            echo ""
            exit 1
          fi
          
          echo "✅ Notion 페이지가 성공적으로 생성되었습니다!"
