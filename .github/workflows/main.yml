name: Sync Issues/PR to Notion

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Notion
        uses: actions/github-script@v6
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # [기존] 이슈용 DB ID (기존에 쓰던 시크릿 그대로 사용)
          NOTION_ISSUE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # [신규] PR용 DB ID (방금 1단계에서 추가한 시크릿 이름)
          NOTION_PR_ID: ${{ secrets.NOTION_PR_DATABASE_ID }}
        with:
          script: |
            // 1. 이벤트 정보 가져오기
            const isIssue = context.eventName === 'issues';
            const payload = context.payload;
            const item = isIssue ? payload.issue : payload.pull_request;
            
            const title = `[${isIssue ? 'Issue' : 'PR'}] #${item.number} ${item.title}`;
            const url = item.html_url;

            // ★ 여기서 갈림길! 이슈면 이슈DB, PR이면 PR DB 선택
            const targetDatabaseId = isIssue ? process.env.NOTION_ISSUE_ID : process.env.NOTION_PR_ID;
            
            // 2. Notion API 호출
            const response = await fetch('https://api.notion.com/v1/pages', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                'Content-Type': 'application/json',
                'Notion-Version': '2022-06-28'
              },
              body: JSON.stringify({
                // 위에서 선택한 DB ID를 사용
                parent: { database_id: targetDatabaseId },
                properties: {
                  "Name": { 
                    title: [
                      {
                        text: {
                          content: title
                        }
                      }
                    ]
                  },
                  "URL": { 
                    url: url
                  },
                  "Status": { 
                    select: {
                      name: "Not Started" 
                    }
                  }
                }
              })
            });
            
            if (!response.ok) {
              const errorText = await response.text();
              core.setFailed(`Notion API Error: ${response.status} ${errorText}`);
            } else {
              console.log(`Successfully added to ${isIssue ? 'Issue' : 'PR'} Database!`);
            }
