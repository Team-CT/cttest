name: Sync Issues/PR to Notion

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Notion
        uses: actions/github-script@v6
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # [수정됨] Secrets에 저장한 이름(NOTION_DATABASE_ID)과 똑같이 맞춤
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          script: |
            // 1. 이벤트 정보 가져오기
            const isIssue = context.eventName === 'issues';
            const payload = context.payload;
            const item = isIssue ? payload.issue : payload.pull_request;
            
            const title = `[${isIssue ? 'Issue' : 'PR'}] #${item.number} ${item.title}`;
            const url = item.html_url;
            
            // 2. Notion API 호출
            const response = await fetch('https://api.notion.com/v1/pages', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                'Content-Type': 'application/json',
                'Notion-Version': '2022-06-28'
              },
              body: JSON.stringify({
                // [수정됨] 위에서 설정한 변수명 사용
                parent: { database_id: process.env.NOTION_DATABASE_ID },
                properties: {
                  "Name": { 
                    title: [
                      {
                        text: {
                          content: title
                        }
                      }
                    ]
                  },
                  "URL": { 
                    url: url
                  },
                  "Status": { 
                    // 사진을 보니 '선택(Select)' 속성으로 잘 바꾸셨네요! 이대로 두면 됩니다.
                    select: {
                      name: "Not Started" 
                    }
                  }
                }
              })
            });
            
            if (!response.ok) {
              const errorText = await response.text();
              core.setFailed(`Notion API Error: ${response.status} ${errorText}`);
            } else {
              console.log("Successfully added to Notion!");
            }
