name: Sync Issues/PR to Notion

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Notion
        uses: actions/github-script@v6
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        with:
          script: |
            // 1. 이벤트 정보 가져오기 (이슈인지 PR인지, 제목, 링크 등)
            const isIssue = context.eventName === 'issues';
            const payload = context.payload;
            const item = isIssue ? payload.issue : payload.pull_request;
            
            const title = `[${isIssue ? 'Issue' : 'PR'}] #${item.number} ${item.title}`;
            const url = item.html_url;
            
            // 2. Notion API 호출
            const response = await fetch('https://api.notion.com/v1/pages', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                'Content-Type': 'application/json',
                'Notion-Version': '2022-06-28'
              },
              body: JSON.stringify({
                parent: { database_id: process.env.NOTION_DATABASE_ID },
                properties: {
                  "Name": { // 노션 데이터베이스의 '제목' 컬럼명
                    title: [
                      {
                        text: {
                          content: title
                        }
                      }
                    ]
                  },
                  "URL": { // 노션 데이터베이스의 'URL' 컬럼명
                    url: url
                  },
                  "Status": { // 노션 데이터베이스의 '상태' 컬럼명 (옵션이 미리 만들어져 있어야 함)
                    select: {
                      name: "Not Started" 
                    }
                  }
                }
              })
            });
            
            if (!response.ok) {
              const errorText = await response.text();
              core.setFailed(`Notion API Error: ${response.status} ${errorText}`);
            } else {
              console.log("Successfully added to Notion!");
            }
