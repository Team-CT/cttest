name: Notion Issue Sync
on:
  issues:
    types: [opened]

jobs:
  create-card:
    runs-on: ubuntu-latest
    steps:
      - name: Create Notion Page
        run: |
          echo "📝 Issue 정보:"
          echo "  제목: ${{ github.event.issue.title }}"
          echo "  URL: ${{ github.event.issue.html_url }}"
          echo "  Database ID: ${{ secrets.NOTION_DATABASE_ID }}"
          echo ""
          
          RESPONSE=$(curl -f -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -w "\n%{http_code}" \
            -d '{
              "parent": { "database_id": "${{ secrets.NOTION_DATABASE_ID }}" },
              "properties": {
                "이름": {
                  "title": [
                    {
                      "text": {
                        "content": "${{ github.event.issue.title }}"
                      }
                    }
                  ]
                },
                "GitHub 링크": {
                  "url": "${{ github.event.issue.html_url }}"
                },
                "상태": {
                  "status": {
                    "name": "시작 전"
                  }
                }
              }
            }')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📡 API 응답:"
          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body:"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          echo ""
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ 요청 실패! (HTTP $HTTP_CODE)"
            echo ""
            echo "🔍 확인 사항:"
            echo "1. NOTION_API_KEY가 유효한가?"
            echo "2. NOTION_DATABASE_ID가 맞는가?"
            echo "3. Integration이 데이터베이스에 연결되었는가?"
            echo "4. 속성명이 정확한가? ('이름', 'GitHub 링크', '상태')"
            exit 1
          fi
          
          echo "✅ Notion 페이지가 성공적으로 생성되었습니다!"
